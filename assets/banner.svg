<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="70%" stop-color="#39FF14" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="#050805"/>

  <!-- matrix rain columns -->
  <g font-family="Courier New, monospace" font-size="14" fill="url(#fade)">
    <text x="20" y="0"><animate attributeName="y" from="-200" to="260" dur="2.3s" repeatCount="indefinite"/>1 0 1 1 0 0 1 0 1 1</text>
    <text x="55" y="0" fill-opacity="0.8"><animate attributeName="y" from="-260" to="260" dur="3.1s" repeatCount="indefinite" begin="0.4s"/>ﾊ ﾐ ｹ ｦ 0 1 ｳ ｼ</text>
    <text x="90" y="0"><animate attributeName="y" from="-180" to="260" dur="1.9s" repeatCount="indefinite" begin="0.9s"/>0 1 0 0 1 1 0 1</text>
    <text x="130" y="0" fill-opacity="0.7"><animate attributeName="y" from="-240" to="260" dur="2.7s" repeatCount="indefinite" begin="0.2s"/>ｦ ﾃ ﾂ 1 0 ｸ ﾗ</text>
    <text x="170" y="0"><animate attributeName="y" from="-220" to="260" dur="2.1s" repeatCount="indefinite" begin="1.1s"/>1 1 0 1 0 0 1</text>
    <text x="720" y="0"><animate attributeName="y" from="-200" to="260" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>0 1 1 0 1 0 1</text>
    <text x="760" y="0" fill-opacity="0.8"><animate attributeName="y" from="-260" to="260" dur="3.3s" repeatCount="indefinite" begin="1.3s"/>ﾐ ｹ 0 ﾜ 1 ｦ</text>
    <text x="800" y="0"><animate attributeName="y" from="-180" to="260" dur="2s" repeatCount="indefinite" begin="0.7s"/>1 0 1 1 0 ｼ 1</text>
    <text x="840" y="0" fill-opacity="0.7"><animate attributeName="y" from="-230" to="260" dur="2.8s" repeatCount="indefinite" begin="0.1s"/>0 ｦ 1 ﾃ 0 1 ﾗ</text>
    <text x="870" y="0"><animate attributeName="y" from="-210" to="260" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>1 1 0 0 1 0 1</text>
  </g>

  <!-- glitch title: three offset layers -->
  <g font-family="Courier New, monospace" font-weight="bold" font-size="56" text-anchor="middle" filter="url(#glow)">
    <text x="450" y="115" fill="#ff003c" opacity="0.7">
      SA7THAK
      <animate attributeName="x" values="450;446;452;450" dur="0.25s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="115" fill="#00fff9" opacity="0.7">
      SA7THAK
      <animate attributeName="x" values="450;454;448;450" dur="0.3s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="115" fill="#39FF14">
      SA7THAK
    </text>
  </g>

  <text x="450" y="150" font-family="Courier New, monospace" font-size="15" fill="#39FF14" text-anchor="middle" opacity="0.85">
    &gt; system architect of things that shouldn't work, but do
  </text>

  <!-- terminal cursor line -->
  <g font-family="Courier New, monospace" font-size="18" fill="#39FF14">
    <text x="450" y="195" text-anchor="middle">guest@sa7thak:~$ access_granted</text>
    <rect x="628" y="182" width="11" height="18">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="0" y="0" width="900" height="240" fill="none" stroke="#39FF14" stroke-opacity="0.25" stroke-width="2"/>
</svg>
